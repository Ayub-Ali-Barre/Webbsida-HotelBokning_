<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Aurora Grand Hotels</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/contact.css">
  </head>
  <body>
    <nav class="nav">
      <a href="index.html" class="logo">AURORA</a>
     <div id="menu" class="menu">
  <a href="hotels.html" class="link">Hotels</a>
  <a href="contact.html" class="link">Contact</a>
</div>
      <div id="navButtons" class="nav_buttons">
      <a href="login.html" class="btn btn-outline">Sign In</a>
      <a href="register.html" class="btn btn-outline">register</a>
      </div>
    </nav>

    <main class="contact-grid">
      <section class="contact-form-section">
        <div class="form-container">
          <span class="label">Inquiries</span>
          <h1 class="title">Get in Touch</h1>
          <p class="sub">Whether it's a booking or a bespoke request, our concierge team is here to assist you.</p>
          
          <form class="luxury-form">
            <div class="form-row">
              <div class="form-group">
                <label>First Name</label>
                <input type="text">
              </div>
              <div class="form-group">
                <label>Last Name</label>
                <input type="text">
              </div>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email>
            </div>
            <div class="form-group">
              <label>Subject</label>
              <select>
                <option>Booking Inquiry</option>
                <option>Private Events</option>
                <option>Partnerships</option>
                <option>General Feedback</option>
              </select>
            </div>
            <div class="form-group">
              <label>Message</label>
              <textarea rows="5" placeholder="How can we help you today?"></textarea>
            </div>
            <button type="submit" class="btn btn-gold">Send Message</button>
          </form>
        </div>
      </section>
      <script src="JS/auth.js"></script>
  </body>
</html>
