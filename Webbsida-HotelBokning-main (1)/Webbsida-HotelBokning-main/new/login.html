<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Aurora Grand Hotels</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/login.css">
  </head>
  <body class="auth-page login">
    <a href="index.html" class="btn-back">← Back to Gallery</a>
    
    <div class="auth-card">
      <a href="index.html" class="logo">Aurora</a>
      <h2 class="title">Welcome Back</h2>
      
    <form id="loginForm" class="auth-form">
  <div class="form-group">
    <label class="label">Email Address</label>
    <input id="email" type="email" class="form-input" required>
  </div>

  <div class="form-group">
    <label class="label">Password</label>
    <input id="password" type="password" class="form-input" required>
  </div>

  <button type="submit" class="btn btn-gold">Sign In</button>
</form>
      
      <p class="auth-switch">
        Don't have an account? <a href="register.html" class="link">Register</a>
      </p>
    </div>
    <script src="JS/login.js"></script>
  </body>
</html>
