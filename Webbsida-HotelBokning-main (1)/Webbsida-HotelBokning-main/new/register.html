<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Aurora Grand Hotels</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/register.css">
  </head>
  <body class="auth-page register">
    <a href="index.html" class="btn-back">← Back to Gallery</a>
    
    <div id="auth-card" class="auth-card">
      <a href="index.html" class="logo">Aurora</a>
      <h2 class="title">Create Account</h2>
      
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label class="label">Full Name</label>
          <input id="fullname" type="text" class="form-input" placeholder="" required>
        </div>
        <div class="form-group">
          <label class="label">Username</label>
          <input id="username" type="text" class="form-input" placeholder="" required>
        </div>
        <div class="form-group">
          <label class="label">Email Address</label>
          <input id="email"  type="email" class="form-input" placeholder="" required>
        </div>
        <div class="form-group">
          <label class="label">Password</label>
          <input id="password"  type="password" class="form-input" placeholder="" required>
        </div>
        <button type="submit" class="btn btn-gold">Join</button>
      </form>
      <p class="auth-switch">
        Already a member? <a href="login.html" class="link">Login</a>
      </p>
    </div>
    <script src="JS/register.js"></script>
    <script src="JS/auth.js"></script>
  </body>
</html>
