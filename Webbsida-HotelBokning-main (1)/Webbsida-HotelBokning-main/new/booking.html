<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Your Stay | Aurora Grand Hotels</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/index.css">
    <link rel="stylesheet" href="CSS/booking.css">
  </head>
  <body>
   <nav class="nav">
      <a href="index.html" class="logo">AURORA</a>
     <div id="menu" class="menu">
     <a href="hotels.html" class="link">Hotels</a>
     <a href="contact.html" class="link">Contact</a>
   </div>
      <div id="navButtons" class="nav_buttons">
      <a href="login.html" class="btn btn-outline">Sign In</a>
      <a href="register.html" class="btn btn-outline">register</a>
      </div>
    </nav>

    <main class="booking-container">
      <div id="booking-content" class="booking-grid">
        <div style="grid-column: 1/-1; text-align: center; padding: 4rem;">
          <div class="loading-spinner"></div>
          <p style="margin-top: 1rem; color: var(--secondary); letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem;">Preparing your reservation...</p>
        </div>
      </div>
    </main>

    <div id="amenities-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Personalize Your Stay</h2>
          <p>Select additional amenities to enhance your experience.</p>
        </div>
        <div id="amenities-options" class="amenities-options">
          <!-- Options injected here -->
        </div>
        <div class="modal-footer">
          <button id="close-modal" class="btn btn-outline">Cancel</button>
          <button id="confirm-booking" class="btn btn-gold">Confirm Reservation</button>
        </div>
      </div>
    </div>



    <footer class="footer">
      <div>
        <div class="logo" style="margin-bottom: 1.5rem; font-size: 1.5rem;">Aurora</div>
        <p style="opacity: 0.5; font-size: 0.9rem; max-width: 300px;">Visionary design and exceptional hospitality since 1924.</p>
      </div>
      <div>
    </footer>
    <script type="module" src="JS/booking.js"></script>
    <script type="module" src="JS/auth.js"></script>
  </body>
</html>
